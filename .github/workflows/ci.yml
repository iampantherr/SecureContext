name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, Unit Tests, Security Tests
    runs-on: ubuntu-latest

    timeout-minutes: 10

    strategy:
      matrix:
        node-version: ["22.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Unit tests (vitest — 300 tests)
        run: npm test

      - name: Security attack vector tests (84 vectors — exits 1 on any FAIL)
        run: node security-tests/run-all.mjs

      - name: Verify dist/server.js starts cleanly
        run: |
          timeout 5 node dist/server.js < /dev/null || true
          # Server should exit cleanly (stdin closes → MCP transport ends)
          echo "Server startup check complete"

  lint:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
      - run: npm ci
      - name: Type check (no emit)
        run: npx tsc --noEmit
