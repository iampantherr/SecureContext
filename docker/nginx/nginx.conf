worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # Security headers
  add_header X-Frame-Options          DENY;
  add_header X-Content-Type-Options   nosniff;
  add_header X-XSS-Protection         "1; mode=block";
  add_header Referrer-Policy          "no-referrer";
  add_header Content-Security-Policy  "default-src 'none'";

  # Hide nginx version
  server_tokens off;

  # Timeouts
  client_body_timeout    12;
  client_header_timeout  12;
  keepalive_timeout      15;
  send_timeout           10;

  # Rate limiting: 50 req/s burst per IP (in addition to app-level limit)
  limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;

  # Request body size limit (mirrors Fastify bodyLimit: 1MB)
  client_max_body_size 1m;

  upstream sc_api {
    server sc-api:3099;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    # Health check (no rate limit, no auth)
    location = /health {
      proxy_pass         http://sc_api;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      access_log         off;
    }

    # API endpoints
    location /api/ {
      limit_req zone=api burst=20 nodelay;

      proxy_pass         http://sc_api;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Timeouts for long-running operations (embedding computation, chain verify)
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # Reject all other paths
    location / {
      return 404;
    }
  }
}
